name: life_maxing_app
description: A full AI-powered Looks, Body & Mind Maxing application.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.6

  # Firebase Core
  firebase_core: ^2.24.2

  # Authentication
  firebase_auth: ^4.17.5
  google_sign_in: ^6.2.1

  # Firestore
  cloud_firestore: ^4.15.8

  # Storage
  firebase_storage: ^11.6.7

  # Ads
  google_mobile_ads: ^3.0.0

  # Local DB
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Connectivity
  connectivity_plus: ^5.0.2

  # HTTP for AI
  http: ^1.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true

  assets:
    - assets/icons/
    - assets/images/
